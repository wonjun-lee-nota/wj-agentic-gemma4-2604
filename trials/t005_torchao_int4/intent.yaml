trial_id: t005_torchao_int4
method: gptq
bit_width: 4
group_size: 128
calibration_set: null
quant_target: all_params_including_3d_moe_experts
notes: >
  Uses torchao quantize_affine() to manually quantize ALL weight tensors
  including fused 3D MoE expert tensors. Reshapes [num_experts, out, in] to
  [num_experts*out, in], applies Int4 group quantization, then saves in a
  format loadable by transformers. No calibration needed (RTN rounding).
engine: transformers
